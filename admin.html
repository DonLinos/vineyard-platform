<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Vineyard Admin · Marathasa</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;color:#1a1a1a;font-size:14px;}
.topbar{background:#1a1a1a;color:#fff;padding:12px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50;}
.topbar-title{font-size:14px;font-weight:500;flex:1;}
.topbar button{font-size:12px;padding:5px 12px;border-radius:6px;border:1px solid #444;background:transparent;color:#fff;cursor:pointer;white-space:nowrap;}
.topbar button:hover{background:#333;}
.topbar button.primary{background:#2d6a4f;border-color:#2d6a4f;}
.app{max-width:900px;margin:0 auto;padding:1.25rem;}
.sec-lbl{font-size:11px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:.08em;margin:1.5rem 0 .5rem;}
.card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:1.25rem;margin-bottom:.75rem;}
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.field{display:flex;flex-direction:column;gap:4px;}
.flbl{font-size:11px;color:#888;}
.finp{font-size:13px;padding:7px 9px;border-radius:7px;border:1px solid #ddd;background:#fafafa;color:#1a1a1a;font-family:inherit;outline:none;width:100%;}
.finp:focus{border-color:#2d6a4f;background:#fff;}
.fsel{font-size:13px;padding:7px 9px;border-radius:7px;border:1px solid #ddd;background:#fafafa;color:#1a1a1a;font-family:inherit;outline:none;width:100%;cursor:pointer;}
.fsel:focus{border-color:#2d6a4f;}
.fta{font-size:13px;padding:7px 9px;border-radius:7px;border:1px solid #ddd;background:#fafafa;color:#1a1a1a;font-family:inherit;outline:none;width:100%;resize:vertical;line-height:1.6;}
.fta:focus{border-color:#2d6a4f;background:#fff;}
.btn{font-size:12px;padding:6px 14px;border-radius:7px;border:1px solid #ddd;background:#fff;color:#333;cursor:pointer;font-family:inherit;}
.btn:hover{background:#f5f4f0;}
.btn-green{background:#2d6a4f;border-color:#2d6a4f;color:#fff;}
.btn-green:hover{background:#1b4332;}
.btn-blue{background:#1a56db;border-color:#1a56db;color:#fff;}
.btn-blue:hover{background:#1240a0;}
.btn-dashed{border-style:dashed;background:transparent;color:#888;width:100%;padding:8px;}
.btn-dashed:hover{background:#f5f4f0;color:#333;}
.btn-danger{color:#c0392b;border-color:#e0b0ad;background:transparent;}
.btn-danger:hover{background:#fdf0ef;}
.btn-sm{font-size:11px;padding:4px 9px;}
.btn-scan{display:flex;align-items:center;gap:6px;background:#1a56db;border:none;color:#fff;font-size:12px;font-weight:500;padding:6px 12px;border-radius:7px;cursor:pointer;font-family:inherit;}
.btn-scan:hover{background:#1240a0;}
.btn-scan svg{flex-shrink:0;}
.blk-scan-icon{display:flex;align-items:center;justify-content:center;width:26px;height:26px;background:transparent;border:1px solid #cfd8e6;color:#1a56db;border-radius:6px;cursor:pointer;flex-shrink:0;}
.blk-scan-icon:hover{background:#eef3fd;}
.blk-open-btn{display:flex;align-items:center;justify-content:center;width:32px;height:32px;background:#2d6a4f;border:none;color:#fff;border-radius:8px;cursor:pointer;font-size:16px;font-weight:700;flex-shrink:0;}
.blk-open-btn:hover{background:#1b4332;}

.area-card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;margin-bottom:10px;overflow:hidden;}
.area-header{display:flex;align-items:center;gap:12px;padding:12px 16px;background:#fafafa;cursor:pointer;user-select:none;}
.area-header:hover{background:#f0efeb;}
.area-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.area-title{font-size:14px;font-weight:600;flex:1;}
.area-meta{font-size:12px;color:#888;}
.chev{font-size:11px;color:#aaa;transition:transform .2s;}
.chev.open{transform:rotate(180deg);}
.area-body{padding:1rem 1.25rem;}
.static-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem;}
.static-cell{background:#f5f4f0;border-radius:8px;padding:8px 12px;}
.sc-lbl{font-size:10px;color:#999;margin-bottom:2px;}
.sc-val{font-size:13px;font-weight:500;}
.blocks-lbl{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.07em;margin:.75rem 0 .5rem;padding-top:.75rem;border-top:1px solid #eee;}

.vy-grower{font-size:11px;color:#888;flex:1;}

.vy-actions{display:flex;gap:5px;align-items:center;}

.obs-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:1rem;}
.otab{font-size:12px;padding:5px 12px;border-radius:99px;border:1px solid #ddd;background:#fff;color:#555;cursor:pointer;}
.otab.on{background:#2d6a4f;border-color:#2d6a4f;color:#fff;font-weight:500;}

.p-bbch{background:#e8f4ed;color:#1b4332;}
.p-insects{background:#fef3cd;color:#7d4e00;}
.p-diseases{background:#fdecea;color:#a32d2d;}
.p-management{background:#e8f0fe;color:#1a56db;}
.p-estimations{background:#f0eeff;color:#5b21b6;}
.obs-card{border:1px solid #eee;border-radius:8px;padding:10px 12px;margin-bottom:7px;}
.obs-card-hdr{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-start;justify-content:center;z-index:100;padding:1rem;overflow-y:auto;}
.modal{background:#fff;border-radius:14px;padding:1.5rem;width:100%;max-width:600px;margin:auto;}
.modal-title{font-size:16px;font-weight:600;margin-bottom:1.25rem;}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;}
.work-order-box{background:#fff8f0;border:1px solid #fcd9b0;border-radius:8px;padding:12px;margin-top:10px;}
.wo-lbl{font-size:11px;font-weight:600;color:#e65100;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
.metric-row{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:1.25rem;}
.met{background:#fff;border:1px solid #eee;border-radius:8px;padding:.75rem 1rem;}
.met-val{font-size:20px;font-weight:600;}
.met-lbl{font-size:11px;color:#888;}

/* SCANNER STYLES */
.scanner-modal{background:#fff;border-radius:16px;padding:0;width:100%;max-width:680px;margin:auto;overflow:hidden;}
.scanner-header{background:#1a1a1a;color:#fff;padding:14px 18px;display:flex;align-items:center;gap:10px;}
.scanner-header-title{font-size:15px;font-weight:600;flex:1;}
.scanner-body{padding:1.25rem;}
.scan-drop-zone{border:2px dashed #cbd5e0;border-radius:12px;padding:2rem;text-align:center;cursor:pointer;transition:border-color .2s;background:#fafafa;margin-bottom:1rem;}
.scan-drop-zone:hover{border-color:#1a56db;background:#f0f4ff;}
.scan-drop-zone.drag-over{border-color:#1a56db;background:#e8f0fe;}
.scan-icon{width:40px;height:40px;background:#e8f0fe;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 10px;}
.scan-photos-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1rem;}
.scan-photo-item{position:relative;border-radius:8px;overflow:hidden;aspect-ratio:1;}
.scan-photo-item img{width:100%;height:100%;object-fit:cover;}
.scan-photo-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.35);}
.scan-photo-result{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.7);color:#fff;font-size:11px;font-weight:600;text-align:center;padding:3px 4px;}
.scan-photo-result.loading{background:rgba(26,86,219,.8);}

.scan-photo-rep{position:absolute;top:4px;right:4px;background:#f59e0b;color:#fff;font-size:10px;font-weight:700;padding:2px 5px;border-radius:4px;}
.scan-result-box{background:#f0f9f4;border:1px solid #a7d7b8;border-radius:10px;padding:1rem;margin-bottom:1rem;}
.scan-result-main{font-size:22px;font-weight:700;color:#1b4332;margin-bottom:4px;}
.scan-result-sub{font-size:13px;color:#2d6a4f;}
.scan-dist-bar{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}
.scan-dist-item{font-size:11px;padding:3px 8px;border-radius:99px;background:#e8f4ed;color:#1b4332;font-weight:500;}
.scan-dist-item.major{background:#2d6a4f;color:#fff;}
.scan-progress{height:4px;background:#e5e7eb;border-radius:2px;margin-bottom:1rem;overflow:hidden;}
.scan-progress-bar{height:100%;background:#1a56db;border-radius:2px;transition:width .3s;}
.api-key-box{background:#fff8f0;border:1px solid #fcd9b0;border-radius:8px;padding:12px;margin-bottom:1rem;}
.api-key-lbl{font-size:11px;font-weight:600;color:#e65100;margin-bottom:6px;}
@media(max-width:560px){
  .g2,.g3,.g4,.static-grid,.metric-row{grid-template-columns:1fr 1fr;}

  .topbar-title{font-size:13px;}
  .topbar{flex-wrap:wrap;padding:10px 14px;}
  .topbar-title{width:100%;margin-bottom:4px;}
  .block-row{flex-wrap:wrap;}
  .blk-actions{flex-basis:100%;justify-content:flex-end;margin-top:6px;}
}
</style>
</head>

<div class="app">

  <div class="sec-lbl">Report header</div>
  <div class="card">
    <div class="g3" style="margin-bottom:10px;">
      <div class="field"><span class="flbl">Winery</span><input class="finp" id="hWinery" value="Marathasa Winery"></div>

    <div style="font-size:12px;color:#2d6a4f;">✓ Ο σαρωτής BBCH λειτουργεί μέσω ασφαλούς cloud function — δεν χρειάζεται πλέον API key εδώ.</div>

<div id="modalContainer"></div>
<div id="blockModalContainer"></div>

<div id="scannerContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
// ─── ΣΥΝΔΕΣΗ ΜΕ ΤΟ SUPABASE ───
// Αντικατέστησε τα δύο παρακάτω με τα δικά σου (Settings → API Keys):
const SUPABASE_URL = 'https://xxyrareqzgvsaolhftbh.supabase.co';
const SUPABASE_KEY = 'sb_publishable_x46jDuVbrSELrlekl5pQ7A_4i4xuaNE';

const supabaseClient = (SUPABASE_URL.startsWith('http'))
  ? supabase.createClient(SUPABASE_URL, SUPABASE_KEY)
  : null;

if(!supabaseClient){
  console.warn('Supabase δεν έχει συνδεθεί ακόμα — λείπουν URL/key. Η εφαρμογή συνεχίζει να δουλεύει με localStorage προς το παρόν.');
}

// ─── WINERY ID (από το URL, μετά το login) + AUTH GUARD ───
const urlParams=new URLSearchParams(window.location.search);
const WINERY_ID=urlParams.get('winery_id');

async function requireAuth(){
  if(!supabaseClient)return true;
  const{data:{session}}=await supabaseClient.auth.getSession();
  if(!session){
    window.location.href='login.html';
    return false;
  }
  if(!WINERY_ID){
    alert('Λείπει το winery_id από το URL. Επίστρεψε στη σελίδα σύνδεσης.');
    window.location.href='login.html';
    return false;
  }
  return true;
}

const AREA_COLORS=['#7F77DD','#1D9E75','#D85A30','#378ADD','#BA7517','#D4537E'];
const ORIENTATIONS=['N','NE','E','SE','S','SW','W','NW','Mixed'];
const BBCH_OPTS=[9,53,55,57,61,65,69,71,75,77,81,85,89];
const BBCH_DESC={9:'Buds dormant',53:'Inflorescences visible, bracts unfolding',55:'Inflorescences visible, compact',57:'Inflorescences fully visible',61:'Beginning of flowering',65:'Full flowering (50%)',69:'End of flowering',71:'Fruit set',75:'Berries pea-size',77:'Berries touching',81:'Begin ripening',85:'Softening of berries',89:'Full ripeness'};
const BBCH_WORK={9:'Winter pruning, trunk disease inspection, dormant sprays',53:'Suckering, first preventative fungicide',55:'Shoot thinning, tie-down canes',57:'First spray programme — powdery/downy mildew',61:'Canopy management, flower cluster thinning if needed',65:'Critical spray window — botrytis prevention',69:'Post-flowering spray, shoot positioning',71:'Green harvest assessment',75:'Bunch zone leaf removal',77:'Canopy assessment, second green harvest if needed',81:'Veraison monitoring begins',85:'Pre-harvest sampling — Baumé/berry weight',89:'Harvest decision'};
const INSECTS=['Grapevine moth','Leafhopper','Spider mite','Mealybug','Other'];
const STAGES=['Egg','L1','L2','L3','L4','Adult'];
const DISEASES=['Powdery mildew','Downy mildew','Botrytis'];
const SEVERITY=['Trace','Low','Moderate','High','Severe'];
const MGMT=['Spraying','Pruning','Shoot positioning','Hedging','Leaf removal','Green harvest','Irrigation','Soil tillage','Fertilisation','Suckering','Tie-down','Other'];
const VARIETY_LIST=['XNS — Xynisteri','YND — Yiannoudi','SRH — Syrah','SVB — Sauvignon Blanc','ZFD — Zinfandel','MTR — Mataro','GRN — Grenache','PRM — Promara','MSF — Moschofilero','SRH/YND — Syrah/Yiannoudi','YND/XNS — Yiannoudi/Xynisteri','Other'];
const QUALITY=['Excellent','Good','Fair','Poor'];

let state={areas:[]};
let editingAreaIdx=null;
let editingVineyardCtx=null;
let editingBlockCtx=null;
let editingObsCtx=null;

// Scanner state
let scanPhotos=[];
let scanResults=[];
let scanCtx=null;

function colorFor(i){return AREA_COLORS[i%AREA_COLORS.length];}

function saveApiKey(){} // δεν χρειάζεται πια — το κλειδί ζει κρυφό στο Supabase
function loadApiKey(){return '';}

// ─── SUPABASE SYNC (μεταφορά areas/blocks στο cloud) ───
async function syncToSupabase(){
  if(!supabaseClient){alert('Το Supabase δεν έχει συνδεθεί (λείπει URL/key).');return;}
  const btn=document.getElementById('syncBtn');
  btn.disabled=true;btn.textContent='☁ Syncing...';
  try{
    const wineryId=await getWineryId();

    // Για κάθε area: δημιούργησε αν δεν έχει ήδη dbId, μετά τα blocks του
    for(const area of state.areas){
      let areaId=area.dbId;
      if(!areaId){
        const{data:newArea,error:aErr}=await supabaseClient.from('areas').insert({
          winery_id:wineryId,name:area.name,gps:area.gps||null,
          alt_min:area.altMin?parseInt(area.altMin):null,alt_max:area.altMax?parseInt(area.altMax):null,
          rainfall:area.rainfall?parseInt(area.rainfall):null,avg_temp:area.avgTemp?parseFloat(area.avgTemp):null,
          clay:area.clay?parseFloat(area.clay):null,sand:area.sand?parseFloat(area.sand):null,silt:area.silt?parseFloat(area.silt):null,
          soil:area.soil||null,soil_ph:area.soilPh?parseFloat(area.soilPh):null,soil_note:area.soilNote||null
        }).select('id').single();
        if(aErr)throw aErr;
        areaId=newArea.id;
        area.dbId=areaId;
      }
      for(const vy of area.vineyards){
        let vineyardId=vy.dbId;
        if(!vineyardId){
          const{data:newVy,error:vErr}=await supabaseClient.from('vineyards').insert({
            area_id:areaId,vineyard_code:vy.code,grower:vy.grower||null,gps:vy.gps||null
          }).select('id').single();
          if(vErr)throw vErr;
          vineyardId=newVy.id;
          vy.dbId=vineyardId;
        }
        for(const block of vy.blocks){
          if(block.dbId)continue; // ήδη ανέβηκε
          const{data:newBlock,error:bErr}=await supabaseClient.from('blocks').insert({
            area_id:areaId,vineyard_id:vineyardId,block_code:block.id,variety:block.variety||null,
            year_planted:block.yearPlanted||null,hectares:block.ha?parseFloat(block.ha):null,
            orientation:block.orientation||null,spacing:block.spacing||null
          }).select('id').single();
          if(bErr)throw bErr;
          block.dbId=newBlock.id;
        }
      }
    }
    saveState();
    btn.textContent='☁ Synced ✓';
    const totalBlocks=state.areas.reduce((s,a)=>s+a.vineyards.reduce((ss,v)=>ss+v.blocks.length,0),0);
    alert('Επιτυχής μεταφορά! '+state.areas.length+' περιοχές, '+state.areas.reduce((s,a)=>s+a.vineyards.length,0)+' αμπελώνες και '+totalBlocks+' blocks στο Supabase.');
  }catch(e){
    console.error(e);
    alert('Σφάλμα κατά τη μεταφορά: '+(e.message||e));
    btn.textContent='☁ Sync to Cloud';
  }finally{
    btn.disabled=false;
  }
}

function saveState(){
  try{localStorage.setItem('vineyardData',JSON.stringify({header:getHeader(),areas:state.areas}));}catch(e){}
}

// ─── Βοηθητικά για αυτόματη αποθήκευση παρατηρήσεων ───
let currentVisitId=null;

async function getWineryId(){
  if(!supabaseClient)return null;
  if(!WINERY_ID)throw new Error('Λείπει winery_id — κάνε ξανά login.');
  return WINERY_ID;
}

// Δημιουργεί (μία φορά ανά "συνεδρία") μια εγγραφή visit, βασισμένη στα στοιχεία επικεφαλίδας
async function ensureVisitId(){
  if(currentVisitId)return currentVisitId;
  const wineryId=await getWineryId();
  const h=getHeader();
  const{data,error}=await supabaseClient.from('visits').insert({
    winery_id:wineryId,
    visit_date:h.date||null,
    inspector:h.inspector||null,
    weather:h.weather||null,
    report_no:h.reportNo||null,
    next_visit:h.nextVisit||null,
    purpose:h.purpose||null,
    general_obs:h.genObs||null
  }).select('id').single();
  if(error)throw error;
  currentVisitId=data.id;
  return currentVisitId;
}

// Αν το area/vineyard/block δεν έχει ανέβει ακόμα στο Supabase, το ανεβάζει τώρα (on-demand)
async function ensureBlockSynced(ai,vi,bi){
  const wineryId=await getWineryId();
  const area=state.areas[ai];
  const vy=area.vineyards[vi];
  const block=vy.blocks[bi];
  if(!area.dbId){
    const{data:newArea,error:aErr}=await supabaseClient.from('areas').insert({
      winery_id:wineryId,name:area.name,gps:area.gps||null,
      alt_min:area.altMin?parseInt(area.altMin):null,alt_max:area.altMax?parseInt(area.altMax):null,
      rainfall:area.rainfall?parseInt(area.rainfall):null,avg_temp:area.avgTemp?parseFloat(area.avgTemp):null,
      clay:area.clay?parseFloat(area.clay):null,sand:area.sand?parseFloat(area.sand):null,silt:area.silt?parseFloat(area.silt):null,
      soil:area.soil||null,soil_ph:area.soilPh?parseFloat(area.soilPh):null,soil_note:area.soilNote||null
    }).select('id').single();
    if(aErr)throw aErr;
    area.dbId=newArea.id;
  }
  if(!vy.dbId){
    const{data:newVy,error:vErr}=await supabaseClient.from('vineyards').insert({
      area_id:area.dbId,vineyard_code:vy.code,grower:vy.grower||null,gps:vy.gps||null
    }).select('id').single();
    if(vErr)throw vErr;
    vy.dbId=newVy.id;
  }
  if(!block.dbId){
    const{data:newBlock,error:bErr}=await supabaseClient.from('blocks').insert({
      area_id:area.dbId,vineyard_id:vy.dbId,block_code:block.id,variety:block.variety||null,
      year_planted:block.yearPlanted||null,hectares:block.ha?parseFloat(block.ha):null,
      orientation:block.orientation||null,spacing:block.spacing||null
    }).select('id').single();
    if(bErr)throw bErr;
    block.dbId=newBlock.id;
  }
  return block.dbId;
}

// Στέλνει μία παρατήρηση στον σωστό πίνακα, ανάλογα με τον τύπο της
async function pushObservationToSupabase(type,obs,ai,vi,bi){
  if(!supabaseClient)return;
  try{
    const blockId=await ensureBlockSynced(ai,vi,bi);
    const visitId=await ensureVisitId();
    let table,row;
    if(type==='bbch'){
      table='bbch_observations';
      row={block_id:blockId,visit_id:visitId,bbch_stage:obs.bbch,work_order:obs.workOrder||null,scan_count:obs.scanCount||null,note:obs.note||null,observed_date:obs.date||null};
    }else if(type==='insects'){
      table='insect_observations';
      row={block_id:blockId,visit_id:visitId,presence:obs.presence||null,species:obs.species||null,population:obs.population?parseInt(obs.population):null,life_stages:obs.stages||[],note:obs.note||null,observed_date:obs.date||null};
    }else if(type==='diseases'){
      table='disease_observations';
      row={block_id:blockId,visit_id:visitId,disease:obs.disease||null,severity:obs.severity||null,affected_pct:obs.affectedPct?parseFloat(obs.affectedPct):null,note:obs.note||null,observed_date:obs.date||null};
    }else if(type==='management'){
      table='management_observations';
      row={block_id:blockId,visit_id:visitId,practices:obs.practices||[],note:obs.note||null,observed_date:obs.date||null,status:'pending'};
    }else if(type==='estimations'){
      table='estimation_observations';
      row={block_id:blockId,visit_id:visitId,baume:obs.baume?parseFloat(obs.baume):null,tartaric_acid:obs.tartaricAcid?parseFloat(obs.tartaricAcid):null,ph:obs.ph?parseFloat(obs.ph):null,yield_est_kg_ha:obs.yieldEst?parseFloat(obs.yieldEst):null,harvest_window:obs.harvestWindow||null,berry_weight_g:obs.berryWeight?parseFloat(obs.berryWeight):null,juice_yield:obs.juiceYield?parseFloat(obs.juiceYield):null,quality_outlook:obs.quality||null,note:obs.note||null,observed_date:obs.date||null};
    }else return;
    const{data,error}=await supabaseClient.from(table).insert(row).select('id').single();
    if(error)throw error;
    obs.dbId=data.id;
    obs.synced=true;
  }catch(e){
    console.error('Cloud sync απέτυχε για παρατήρηση:',e);
    obs.synced=false; // θα προσπαθήσουμε ξανά αργότερα — προς το παρόν παραμένει τοπικά
  }
}

async function loadFromSupabase(){
  if(!supabaseClient||!WINERY_ID)return null;
  try{
    const{data:areasRows,error:aErr}=await supabaseClient.from('areas').select('*').eq('winery_id',WINERY_ID);
    if(aErr)throw aErr;
    if(!areasRows||!areasRows.length)return null;

    const areas=[];
    for(const a of areasRows){
      const{data:vyRows,error:vErr}=await supabaseClient.from('vineyards').select('*').eq('area_id',a.id);
      if(vErr)throw vErr;
      const{data:blockRows,error:bErr}=await supabaseClient.from('blocks').select('*').eq('area_id',a.id);
      if(bErr)throw bErr;
      areas.push({
        name:a.name,gps:a.gps||'',altMin:a.alt_min||'',altMax:a.alt_max||'',
        rainfall:a.rainfall||'',avgTemp:a.avg_temp||'',clay:a.clay||'',sand:a.sand||'',silt:a.silt||'',
        soil:a.soil||'',soilPh:a.soil_ph||'',soilNote:a.soil_note||'',open:false,dbId:a.id,
        vineyards:(vyRows||[]).map(v=>({
          code:v.vineyard_code,grower:v.grower||'',gps:v.gps||'',open:false,dbId:v.id,
          blocks:(blockRows||[]).filter(b=>b.vineyard_id===v.id).map(b=>({
            id:b.block_code,variety:b.variety||'',yearPlanted:b.year_planted||'',ha:b.hectares||'',
            orientation:b.orientation||'',spacing:b.spacing||'',observations:[],dbId:b.id
          }))
        }))
      });
    }
    return areas;
  }catch(e){
    console.error('Supabase load failed, falling back to localStorage:',e);
    return null;
  }
}

async function loadState(){
  const ok=await requireAuth();
  if(!ok)return;

  if(supabaseClient&&WINERY_ID){
    const{data:w}=await supabaseClient.from('wineries').select('name').eq('id',WINERY_ID).maybeSingle();
    if(w){
      document.querySelector('.topbar-title').textContent=w.name+' · Admin';
      const hw=document.getElementById('hWinery');
      if(hw){hw.value=w.name;hw.readOnly=true;}
    }
  }

  // Πρώτα δοκίμασε Supabase (η "αλήθεια" που μοιράζεται σε κάθε μηχάνημα)
  const cloudAreas=await loadFromSupabase();
  if(cloudAreas){
    state.areas=cloudAreas;
    saveState(); // κράτα και τοπικό αντίγραφο για offline fallback
  }else{
    // Fallback: localStorage (π.χ. πρώτη φορά, ή δεν υπάρχει σύνδεση)
    const isMarathasa=(document.getElementById('hWinery')?.value||'')==='Marathasa Winery';
    const s=localStorage.getItem('vineyardData');
    if(s){
      try{
        const d=JSON.parse(s);
        state.areas=d.areas&&d.areas.length?d.areas:(isMarathasa?makeDefaultAreas():[]);
      }catch(e){state.areas=isMarathasa?makeDefaultAreas():[];}
    }else{state.areas=isMarathasa?makeDefaultAreas():[];}
  }
  // Header πεδία πάντα από localStorage (ακόμα δεν τα έχουμε συνδέσει στο Supabase)
  const s2=localStorage.getItem('vineyardData');
  if(s2){
    try{
      const d2=JSON.parse(s2);
      if(d2.header){
        const keys=['winery','date','inspector','region','weather','reportNo','nextVisit','purpose','genObs'];
        const ids=['hWinery','hDate','hInspector','hRegion','hWeather','hReportNo','hNextVisit','hPurpose','hGenObs'];
        keys.forEach((k,i)=>{const el=document.getElementById(ids[i]);if(el)el.value=d2.header[k]||'';});
      }
    }catch(e){}
  }
  loadApiKey();
  renderAreas();
}

function importData(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=e=>{
    const r=new FileReader();r.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(d.header){const keys=['winery','date','inspector','region','weather','reportNo','nextVisit','purpose','genObs'];const ids=['hWinery','hDate','hInspector','hRegion','hWeather','hReportNo','hNextVisit','hPurpose','hGenObs'];keys.forEach((k,i)=>{const el=document.getElementById(ids[i]);if(el)el.value=d.header[k]||'';});}
        if(d.areas)state.areas=d.areas;renderAreas();alert('Imported.');
      }catch(e){alert('Invalid file.');}
    };r.readAsText(e.target.files[0]);
  };inp.click();
}

  if(obs.type==='insects')return`${obs.species||'—'} · ${obs.presence||''} · pop. ${obs.population||'—'} · ${(obs.stages||[]).join(', ')||'—'}`;
  if(obs.type==='diseases')return`${obs.disease||'—'} · ${obs.severity||'—'}${obs.affectedPct?' · '+obs.affectedPct+'% affected':''}`;

}

async function saveObs(t,ai,vi,bi){
  let obs={type:t,note:document.getElementById('of_note').value,date:document.getElementById('of_date').value||null};
  if(t==='bbch'){obs.bbch=parseInt(document.getElementById('of_bbch').value)||null;obs.workOrder=document.getElementById('of_workorder').value;}
  if(t==='insects'){obs.presence=document.getElementById('of_presence').value;obs.species=document.getElementById('of_species').value;obs.population=document.getElementById('of_pop').value;obs.stages=getSelectedStgs();}
  if(t==='diseases'){obs.disease=document.getElementById('of_disease').value;obs.severity=document.getElementById('of_severity').value;obs.affectedPct=document.getElementById('of_pct').value;}
  if(t==='management')obs.practices=getSelectedStgs();
  if(t==='estimations'){obs.baume=document.getElementById('of_baume').value;obs.tartaricAcid=document.getElementById('of_tartaric').value;obs.ph=document.getElementById('of_ph').value;obs.berryWeight=document.getElementById('of_berry').value;obs.juiceYield=document.getElementById('of_juiceyield').value;obs.yieldEst=document.getElementById('of_yield').value;obs.harvestWindow=document.getElementById('of_harvest').value;obs.quality=document.getElementById('of_quality').value;}
  state.areas[ai].vineyards[vi].blocks[bi].observations.push(obs);
  openBlockDetail(ai,vi,bi);renderAreas();
  await pushObservationToSupabase(t,obs,ai,vi,bi);
  renderAreas(); // ξαναζωγράφισε ώστε να φανεί τυχόν ένδειξη συγχρονισμού
}

// ─── SCANNER ───────────────────────────────────────────────
function openScanner(ai,vi,bi){
  scanPhotos=[];scanResults=[];
  scanCtx={ai,vi,bi};
  renderScanner();
}

function renderScanner(){
  const{ai,vi,bi}=scanCtx;
  const b=state.areas[ai].vineyards[vi].blocks[bi];
  const done=scanResults.filter(r=>r&&r.bbch).length;
  const total=scanPhotos.length;
  const avgBbch=calcAvgBbch();
  const dist=calcDistribution();
  const repIdx=findRepresentativeIdx();

  document.getElementById('scannerContainer').innerHTML=`
  <div class="modal-bg" onclick="if(event.target===this)closeScanner()">
  <div class="scanner-modal">
    <div class="scanner-header">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
      <span class="scanner-header-title">BBCH Scanner — ${b.id}</span>
      <span style="font-size:12px;color:#aaa;">${b.variety||''}</span>
      <button class="btn btn-sm" style="border-color:#555;color:#ccc;" onclick="closeScanner()">✕</button>
    </div>
    <div class="scanner-body">

      ${total>0?`<div class="scan-progress"><div class="scan-progress-bar" style="width:${Math.round(done/total*100)}%"></div></div>`:''}

      ${avgBbch?`
        <div class="scan-result-box">
          <div class="scan-result-main">BBCH ${avgBbch} <span style="font-size:14px;font-weight:400;color:#2d6a4f;">— ${BBCH_DESC[avgBbch]||''}</span></div>
          <div class="scan-result-sub">${done} of ${total} photos analysed · ${total-done>0?'analysing...':'complete'}</div>
          <div class="scan-dist-bar">${dist.map(d=>`<span class="scan-dist-item${d.count===Math.max(...dist.map(x=>x.count))?' major':''}">${d.count}× BBCH ${d.bbch}</span>`).join('')}</div>
        </div>`:`<div style="font-size:13px;color:#888;margin-bottom:1rem;text-align:center;">${total===0?'Add photos to begin scanning':'Analysing photos…'}</div>`}

      ${total>0?`
        <div class="scan-photos-grid">
          ${scanPhotos.map((p,i)=>{
            const res=scanResults[i];
            const isRep=i===repIdx&&avgBbch;
            return`<div class="scan-photo-item">
              <img src="${p.dataUrl}" alt="scan ${i+1}">
              ${isRep?'<div class="scan-photo-rep">REP</div>':''}
              <div class="scan-photo-result ${res?'done':p.loading?'loading':''}">
                ${res?'BBCH '+res.bbch:p.loading?'…':'queued'}
              </div>
            </div>`;
          }).join('')}
        </div>`:''}

      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:${total>0?'0':'0'};">
        <label style="flex:1;">
          <div class="scan-drop-zone" id="dropZone" onclick="document.getElementById('photoInput').click()" ondragover="handleDragOver(event)" ondrop="handleDrop(event)">
            <div class="scan-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1a56db" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
            </div>
            <div style="font-size:13px;font-weight:500;color:#1a56db;">Tap to take photo or select files</div>
            <div style="font-size:12px;color:#aaa;margin-top:4px;">Add up to 20 photos · ${total}/20 added</div>
          </div>
          <input type="file" id="photoInput" accept="image/*" multiple capture="environment" style="display:none" onchange="handlePhotoSelect(event)">
        </label>
      </div>

      <div class="modal-footer" style="margin-top:1rem;">
        <button class="btn" onclick="closeScanner()">Cancel</button>
        ${scanPhotos.length>0?`<button class="btn" onclick="clearScan()">Clear all</button>`:''}
        ${avgBbch?`<button class="btn btn-green" onclick="confirmScan()">Save BBCH ${avgBbch} to block</button>`:''}
      </div>
    </div>
  </div></div>`;
}

function calcAvgBbch(){
  const vals=scanResults.filter(r=>r&&r.bbch).map(r=>r.bbch);
  if(!vals.length)return null;
  const avg=vals.reduce((a,b)=>a+b,0)/vals.length;
  return BBCH_OPTS.reduce((prev,curr)=>Math.abs(curr-avg)<Math.abs(prev-avg)?curr:prev);
}

function calcDistribution(){
  const counts={};
  scanResults.filter(r=>r&&r.bbch).forEach(r=>{counts[r.bbch]=(counts[r.bbch]||0)+1;});
  return Object.entries(counts).map(([bbch,count])=>({bbch:parseInt(bbch),count})).sort((a,b)=>b.count-a.count);
}

function findRepresentativeIdx(){
  const avg=calcAvgBbch();
  if(!avg)return -1;
  let best=-1,bestDiff=999;
  scanResults.forEach((r,i)=>{
    if(r&&r.bbch){const d=Math.abs(r.bbch-avg);if(d<bestDiff){bestDiff=d;best=i;}}
  });
  return best;
}

function handleDragOver(e){e.preventDefault();document.getElementById('dropZone').classList.add('drag-over');}
function handleDrop(e){e.preventDefault();document.getElementById('dropZone').classList.remove('drag-over');processFiles(Array.from(e.dataTransfer.files));}
function handlePhotoSelect(e){processFiles(Array.from(e.target.files));}

function processFiles(files){
  const available=20-scanPhotos.length;
  const toAdd=files.filter(f=>f.type.startsWith('image/')).slice(0,available);
  if(!toAdd.length)return;
  toAdd.forEach(file=>{
    const reader=new FileReader();
    reader.onload=ev=>{
      const idx=scanPhotos.length;
      scanPhotos.push({dataUrl:ev.target.result,loading:true});
      scanResults.push(null);
      renderScanner();
      analysePhoto(ev.target.result,idx);
    };
    reader.readAsDataURL(file);
  });
}

async function analysePhoto(dataUrl,idx){
  try{
    const base64=dataUrl.split(',')[1];
    const mediaType=dataUrl.split(';')[0].split(':')[1];
    // Καλεί τη δική μας ασφαλή Supabase Edge Function — το Anthropic key ΔΕΝ βρίσκεται ποτέ εδώ
    const functionUrl=SUPABASE_URL+'/functions/v1/bbch-scan';
    const resp=await fetch(functionUrl,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+SUPABASE_KEY},
      body:JSON.stringify({base64,mediaType})
    });
    const result=await resp.json();
    if(result.bbch&&BBCH_OPTS.includes(result.bbch)){
      scanResults[idx]=result;
    }else{
      scanResults[idx]={bbch:57,confidence:'low',note:result.error||'Could not determine stage clearly'};
    }
  }catch(e){
    scanResults[idx]={bbch:57,confidence:'error',note:'Analysis failed — using BBCH 57 as fallback'};
  }
  scanPhotos[idx].loading=false;
  renderScanner();
}

function clearScan(){scanPhotos=[];scanResults=[];renderScanner();}
function closeScanner(){document.getElementById('scannerContainer').innerHTML='';}

async function confirmScan(){
  const{ai,vi,bi}=scanCtx;
  const avgBbch=calcAvgBbch();
  const repIdx=findRepresentativeIdx();
  if(!avgBbch)return;
  const savedPhotos=scanPhotos.map((p,i)=>({
    dataUrl:p.dataUrl,
    bbch:scanResults[i]?scanResults[i].bbch:null,
    isRep:i===repIdx
  }));
  const obs={
    type:'bbch',
    bbch:avgBbch,
    date:document.getElementById('hDate')?.value||new Date().toISOString().slice(0,10),
    workOrder:BBCH_WORK[avgBbch]||'',
    scanPhotos:savedPhotos,
    scanCount:scanPhotos.length,
    note:`AI scan: ${scanPhotos.length} photos · avg BBCH ${avgBbch} · ${BBCH_DESC[avgBbch]}`
  };
  state.areas[ai].vineyards[vi].blocks[bi].observations.push(obs);
  closeScanner();
  renderAreas();
  openBlockDetail(ai,vi,bi);
  // Σημείωση: οι ίδιες οι φωτογραφίες (scanPhotos) ΔΕΝ ανεβαίνουν ακόμα στο Supabase Storage —
  // μόνο η μέτρηση BBCH. Το ανέβασμα φωτογραφιών είναι ξεχωριστό επόμενο βήμα.
  await pushObservationToSupabase('bbch',obs,ai,vi,bi);
  renderAreas();
}

async function logout(){
  if(supabaseClient)await supabaseClient.auth.signOut();
  window.location.href='login.html';
}

document.addEventListener('input',()=>saveState());
loadState();
</script>
